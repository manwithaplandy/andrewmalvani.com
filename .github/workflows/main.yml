name: Plan and Deploy

on:
  push:
    branches:
      - 'main'

# Required for OIDC: jobs request a short-lived token to assume the AWS role.
permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: 'Terraform plan'
    runs-on: ubuntu-latest
    environment: "AWS General"
    # email_address has no default (kept out of source); supply it via secret.
    # cloudflare_zone_id comes from a repo var; if unset, the stats aggregator
    # simply skips the Cloudflare uniques/countries query.
    env:
      TF_VAR_email_address: ${{ secrets.EMAIL_ADDRESS }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::870140981796:role/github-deploy
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint npm
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload web assets
        uses: actions/upload-artifact@v7
        with:
          name: out
          path: out

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check

      - name: Terraform Init
        run: terraform -chdir=terraform init -input=false

      - name: Terraform refresh
        run: terraform -chdir=terraform refresh -input=false

      - name: Terraform Plan
        run: terraform -chdir=terraform plan -input=false -out=plan.tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v7
        with:
          name: plan
          path: terraform/plan.tfplan

  terraform-apply:
    name: 'Terraform Apply'
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: "AWS General"
    # email_address has no default (kept out of source); supply it via secret.
    # cloudflare_zone_id comes from a repo var; if unset, the stats aggregator
    # simply skips the Cloudflare uniques/countries query.
    env:
      TF_VAR_email_address: ${{ secrets.EMAIL_ADDRESS }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::870140981796:role/github-deploy
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Terraform Init
        run: terraform -chdir=terraform init -input=false

      - name: Download Plan
        uses: actions/download-artifact@v8
        with:
          name: plan
          path: terraform/plan

      # data.archive_file writes these zips at *plan* time (previous job's
      # workspace), but the provider reads them from disk when creating a
      # Lambda at *apply* time — recreate them here so a first-time function
      # create doesn't fail. Code updates still flow through update-lambda-code.
      - name: Prepare Lambda bootstrap zips
        run: |
          (cd sns_publish_lambda && zip ../terraform/lambda_function.zip lambda_function.py)
          (cd stats_aggregator && zip ../terraform/stats_aggregator.zip lambda_function.py)

      - name: Terraform Apply
        run: terraform -chdir=terraform apply "plan/plan.tfplan"

  update-s3-contents:
      name: Update S3 Contents
      needs: terraform-apply
      runs-on: ubuntu-latest
      environment: "AWS General"
      steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v6
          with:
            role-to-assume: arn:aws:iam::870140981796:role/github-deploy
            aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

        - name: Download build artifacts
          uses: actions/download-artifact@v8
          with:
            name: out
            path: out

        # stats.json is produced by the statsAggregator Lambda, not the build —
        # exclude it so --delete doesn't wipe the data file on every deploy.
        - name: Sync S3 bucket
          run: aws s3 sync out/ s3://$S3_BUCKET_NAME --delete --exclude "stats.json"
          env:
            S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}

  update-lambda-code:
      name: Update Lambda Code
      needs: terraform-apply
      runs-on: ubuntu-latest
      environment: "AWS General"
      strategy:
        matrix:
          include:
            - dir: sns_publish_lambda
              function_var: LAMBDA_FUNCTION_NAME
            - dir: stats_aggregator
              function_var: STATS_AGGREGATOR_FUNCTION_NAME
      steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::870140981796:role/github-deploy
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Zip Lambda Code
        run: |
          cd ${{ matrix.dir }}
          zip ../lambda_code.zip lambda_function.py

      - name: Update Lambda Code
        run: aws lambda update-function-code --function-name $LAMBDA_FUNCTION_NAME --zip-file fileb://lambda_code.zip
        env:
          LAMBDA_FUNCTION_NAME: ${{ vars[matrix.function_var] }}

  cloudfront-invalidation:
      name: Invalidate CloudFront Distribution
      needs: update-s3-contents
      runs-on: ubuntu-latest
      environment: "AWS General"
      steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v6
          with:
            role-to-assume: arn:aws:iam::870140981796:role/github-deploy
            aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

        - name: Setup Node.js environment
          uses: actions/setup-node@v6
          with:
            node-version: '22'

        - name: Install dependencies
          run: npm ci

        - name: Invalidate CloudFront cache
          run: |
            aws cloudfront create-invalidation --distribution-id $CF_DISTRIBUTION_ID --paths "/*"
          env:
            CF_DISTRIBUTION_ID: ${{ vars.CF_DISTRIBUTION_ID }}
